name: CI

on:
  push:
    branches: [ "main","dev", "login-register","ai-generated-notes"]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ADD THIS: This saves minutes of build time
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Combined step: Check linting and run unit tests
      # 'testDebugUnitTest' is the standard for Android unit tests
      - name: Run Unit Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew testDebugUnitTest

      # Optional: Uploads the test report so you can see what failed in the GitHub UI
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: unit-test-reports
          path: app/build/reports/tests/
